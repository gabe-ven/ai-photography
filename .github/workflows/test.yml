name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # requirements.txt includes torch/ultralytics — heavy, but the pip cache
      # keeps repeat runs fast. Tests degrade gracefully without model weights
      # or an ANTHROPIC_API_KEY (VLM/detector paths are mocked or fall back).
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # No test script exists yet; `build` runs tsc, which is the real
      # type-safety gate. (The `lint` script exists but eslint isn't
      # installed/configured — add it before wiring it in here.)
      - name: Type-check and build
        working-directory: frontend
        run: npm run build
